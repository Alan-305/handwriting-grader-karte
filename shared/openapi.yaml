# Handwriting Grader Karte API

openapi: 3.0.3
info:
  title: Handwriting Grader Karte API
  version: 1.0.0
paths:
  /api/health:
    get:
      summary: Health check
  /api/sessions/upload:
    post:
      summary: Upload answer sheet image
